name: Python-to-ARM64 Bridge

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Fix Multiarch Repositories
        run: |
          sudo dpkg --add-architecture arm64
          
          # Создаем чистый конфиг: Intel (amd64) идет на archive/security
          sudo tee /etc/apt/sources.list <<EOF
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ $(lsb_release -cs) main restricted universe
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ $(lsb_release -cs)-updates main restricted universe
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ $(lsb_release -cs)-backports main restricted universe
          deb [arch=amd64] http://security.ubuntu.com/ubuntu/ $(lsb_release -cs)-security main restricted universe
          
          # ARM (arm64) идет только на ports
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs) main restricted universe
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs)-updates main restricted universe
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs)-security main restricted universe
          EOF

          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libpython3.12-dev:arm64 qemu-user
            
      - name: Build Module
        # Нам нужно найти путь к python-headers для ARM64
        run: make PY_INC=/usr/include/python3.12

      - name: Run Python Test via QEMU
        run: |
          # Указываем QEMU, где искать библиотеки и сам python
          export QEMU_LD_PREFIX=/usr/aarch64-linux-gnu
          export PYTHONPATH=.
          qemu-aarch64 -L $QEMU_LD_PREFIX /usr/bin/python3 test_python.py

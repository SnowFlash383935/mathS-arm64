name: ARM64 Build and Test (Fixed)

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Install ARM64 Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu make qemu-user

      - name: Build project
        # Передаем префикс кросс-компилятора в Makefile
        run: make CC=aarch64-linux-gnu-gcc

      - name: Run ARM64 Binary via QEMU
        # qemu-aarch64 - это эмулятор, который запустит ARM-бинарник на Intel
        # -L /usr/aarch64-linux-gnu нужен, чтобы найти ARM-версии libc
        run: qemu-aarch64 -L /usr/aarch64-linux-gnu ./hello_pure

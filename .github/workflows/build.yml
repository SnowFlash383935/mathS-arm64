name: Python-to-ARM64 (M1)

on: [push]

jobs:
  test-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and Test on M1
        run: |
          # Используем системный компилятор
          clang -I$(python3 -c "import sysconfig; print(sysconfig.get_path('include'))") -fPIC -c fast_module.c -o fast_module.o
          clang -c lib.S -o lib.o
          clang -shared fast_module.o lib.o -o mathS.so
          
          export PYTHONPATH=.
          python3 test_python.py
          

name: Python-to-ARM64 (The Final Stand)

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Run everything in Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/ws -w /ws debian:bookworm-slim sh -c "
            set -e
            # 1. Настройка архитектур
            dpkg --add-architecture arm64
            apt-get update
            
            # 2. Установка только нужного (Debian не упадет с 404)
            apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
              libpython3-dev:arm64 python3-dev python3:arm64 make
            
            # 3. Сборка (в Debian Bookworm Python 3.11)
            make CC=aarch64-linux-gnu-gcc PY_INC=/usr/include/python3.11
            
            # 4. Тест
            export PYTHONPATH=.
            python3.11 test_python.py
          "

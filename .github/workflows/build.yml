name: Python-to-ARM64 Bridge (Docker)

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Используем Docker-контейнер, в котором мы хозяева
    container:
      image: ubuntu:24.04
      options: --user root

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Environment
        run: |
          apt-get update
          apt-get install -y software-properties-common
          dpkg --add-architecture arm64
          
          # Вместо правки основного файла, создаем специфичные листы
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe" > /etc/apt/sources.list.d/arm64.list
          # Ограничиваем основной лист только amd64
          sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list

          apt-get update
          apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libpython3.12-dev:arm64 qemu-user make python3 python3-pip

      - name: Build Module
        run: make CC=aarch64-linux-gnu-gcc

      - name: Run Python Test
        run: |
          export PYTHONPATH=.
          qemu-aarch64 -L /usr/aarch64-linux-gnu /usr/bin/python3 test_python.py

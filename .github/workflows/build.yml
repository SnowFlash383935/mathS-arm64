name: Python-to-ARM64 Bridge (Debian Edition)

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --user root

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup QEMU Static
        # Этот экшн регистрирует QEMU в ядре хоста, чтобы Docker понимал ARM-файлы
        uses: docker/setup-qemu-action@v3

      - name: Setup Multiarch and Install Deps
        run: |
          apt-get update
          apt-get install -y dpkg curl lsb-release qemu-user-static
          
          dpkg --add-architecture arm64
          apt-get update
          
          # Теперь, благодаря qemu-user-static, установка пакетов :arm64 пройдет гладко
          apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libpython3-dev:arm64 \
            python3-dev \
            python3:arm64 \
            make

      - name: Build Module
        # Проверяем версию python в Debian Bookworm (обычно 3.11)
        run: make CC=aarch64-linux-gnu-gcc PY_INC=/usr/include/python3.11

      - name: Run Python Test
        run: |
          # Убедимся, что у нас есть ARM64 интерпретатор
          apt-get install -y python3:arm64
          
          export PYTHONPATH=.
          # Теперь запускаем ARM-версию питона через QEMU
          qemu-aarch64 -L /usr/aarch64-linux-gnu /usr/bin/aarch64-linux-gnu-python3.11 test_python.py
